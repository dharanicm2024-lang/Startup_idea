services:
  # Backend: Spring Boot Web Service
  - type: web
    name: task-manager-backend
    runtime: java
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/notetaker-0.0.1-SNAPSHOT.jar
    region: oregon
    envVars:
      - key: SERVER_PORT
        value: 8085
      - key: FIREBASE_CONFIG_JSON
        sync: false

  # Frontend: Vite Static Site
  - type: web
    name: task-manager-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    region: oregon
    envVars:
      - key: VITE_API_BASE_URL
        value: https://task-manager-backend.onrender.com
      - key: VITE_WS_BASE_URL
        value: https://task-manager-backend.onrender.com
